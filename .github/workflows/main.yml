name: Deploy to OpenShift
on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false #do not fail if any of the builds fail
      matrix:
        service: [auth, server, frontend, locust]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install oc CLI
        run: |
          curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/oc/latest/linux/oc.tar.gz
          tar -xzf oc.tar.gz
          sudo mv oc /usr/local/bin/
          oc version --client

      - name: Login to OpenShift
        run: |
          oc login ${{ secrets.OPENSHIFT_SERVER }} \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --insecure-skip-tls-verify=true

      # - name: Trigger Auth Build
      #   run: oc start-build fotoalbum-auth -n fotoalbum --follow

      # - name: Trigger Server Build
      #   run: oc start-build fotoalbum-server -n fotoalbum --follow

      # - name: Trigger Frontend Build
      #   run: oc start-build fotoalbum-frontend -n fotoalbum --follow

      # - name: Trigger Locust Build
      #   run: oc start-build fotoalbum-locust -n fotoalbum --follow
      
      - name: Trigger Build for ${{ matrix.service }}
        run: oc start-build fotoalbum-${{ matrix.service }} -n fotoalbum --follow

      # - name: Update deployments with new images
      #   run: |
      #     AUTH_DIGEST=$(oc get istag fotoalbum-auth:latest -n fotoalbum -o jsonpath='{.image.dockerImageReference}')
      #     SERVER_DIGEST=$(oc get istag fotoalbum-server:latest -n fotoalbum -o jsonpath='{.image.dockerImageReference}')
      #     FRONTEND_DIGEST=$(oc get istag fotoalbum-frontend:latest -n fotoalbum -o jsonpath='{.image.dockerImageReference}')
      #     LOCUST_DIGEST=$(oc get istag fotoalbum-locust:latest -n fotoalbum -o jsonpath='{.image.dockerImageReference}')

          
      #     oc set image deployment/fotoalbum-auth fotoalbum-auth=$AUTH_DIGEST -n fotoalbum
      #     oc set image deployment/fotoalbum-server fotoalbum-server=$SERVER_DIGEST -n fotoalbum
      #     oc set image deployment/fotoalbum-frontend fotoalbum-frontend=$FRONTEND_DIGEST -n fotoalbum
      #     oc set image deployment/fotoalbum-locust fotoalbum-locust=$LOCUST_DIGEST -n fotoalbum

      - name: Update deployment with new image
        run: |
          # Get image digest for the new build
          DIGEST=$(oc get istag fotoalbum-${{ matrix.service }}:latest -n fotoalbum -o jsonpath='{.image.dockerImageReference}')
          
          # Set the new image for the deployment
          oc set image deployment/fotoalbum-${{ matrix.service }} fotoalbum-${{ matrix.service }}=$DIGEST -n fotoalbum
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install oc CLI
        run: |
          curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/oc/latest/linux/oc.tar.gz
          tar -xzf oc.tar.gz
          sudo mv oc /usr/local/bin/

      - name: Login to OpenShift
        run: |
          oc login ${{ secrets.OPENSHIFT_SERVER }} \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --insecure-skip-tls-verify=true

      - name: Get latest image digests
        id: digests
        run: |
          echo "auth=$(oc get istag fotoalbum-auth:latest -n fotoalbum -o jsonpath='{.image.dockerImageReference}')" >> $GITHUB_OUTPUT
          echo "server=$(oc get istag fotoalbum-server:latest -n fotoalbum -o jsonpath='{.image.dockerImageReference}')" >> $GITHUB_OUTPUT
          echo "frontend=$(oc get istag fotoalbum-frontend:latest -n fotoalbum -o jsonpath='{.image.dockerImageReference}')" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Restore Terraform state
        uses: actions/cache@v4
        with:
          path: terraform/terraform.tfstate
          key: terraform-state-${{ github.ref }}
          restore-keys: terraform-state-

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="openshift_api_url=${{ secrets.OPENSHIFT_SERVER }}" \
            -var="openshift_token=${{ secrets.OPENSHIFT_TOKEN }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="db_username=${{ secrets.DB_USERNAME }}" \
            -var="db_name=${{ secrets.DB_NAME }}" \
            -var="db_type=postgres" \
            -var="db_ssl=false" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="s3_access_key=${{ secrets.MINIO_ACCESS }}" \
            -var="s3_secret_key=${{ secrets.MINIO_SECRET }}" \
            -var="s3_endpoint=${{ secrets.S3_ENDPOINT }}" \
            -var="s3_image_endpoint=${{ secrets.S3_IMAGE_ENDPOINT }}" \
            -var="s3_bucket=${{ secrets.S3_BUCKET }}" \
            -var="cors_origins=${{ secrets.CORS_ORIGINS }}" \
            -var="next_public_backend_url=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}" \
            -var="auth_endpoint=http://fotoalbum-auth:8888" \
            -var="auth_image=${{ steps.digests.outputs.auth }}" \
            -var="backend_image=${{ steps.digests.outputs.server }}" \
            -var="frontend_image=${{ steps.digests.outputs.frontend }}"

      - name: Save Terraform state
        uses: actions/cache@v4
        with:
          path: terraform/terraform.tfstate
          key: terraform-state-${{ github.ref }}
      

