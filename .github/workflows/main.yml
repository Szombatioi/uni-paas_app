name: Deploy to OpenShift
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false #do not fail if any of the builds fail
      matrix:
        include:
          - service: auth
            paths: fotoalbum_auth/**
          - service: server
            paths: fotoalbum_server/**
          - service: frontend
            paths: fotoalbum_frontend/**
          - service: locust
            paths: locust/**
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Check for changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^${{ matrix.paths }}"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install oc CLI
        run: |
          curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/oc/latest/linux/oc.tar.gz
          tar -xzf oc.tar.gz
          sudo mv oc /usr/local/bin/
          oc version --client

      - name: Login to OpenShift
        run: |
          oc login ${{ secrets.OPENSHIFT_SERVER }} \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --insecure-skip-tls-verify=true

      - name: Trigger Build for ${{ matrix.service }}
        if: steps.changes.outputs.changed == 'true'
        run: oc start-build fotoalbum-${{ matrix.service }} -n fotoalbum --follow

      - name: Update deployment with new image
        if: steps.changes.outputs.changed == 'true'
        run: |
          DIGEST=$(oc get istag fotoalbum-${{ matrix.service }}:latest -n fotoalbum -o jsonpath='{.image.dockerImageReference}')
          oc set image deployment/fotoalbum-${{ matrix.service }} fotoalbum-${{ matrix.service }}=$DIGEST -n fotoalbum
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install oc CLI
        run: |
          curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/oc/latest/linux/oc.tar.gz
          tar -xzf oc.tar.gz
          sudo mv oc /usr/local/bin/

      - name: Login to OpenShift
        run: |
          oc login ${{ secrets.OPENSHIFT_SERVER }} \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --insecure-skip-tls-verify=true

      - name: Get latest image digests
        id: digests
        run: |
          echo "auth=$(oc get istag fotoalbum-auth:latest -n fotoalbum -o jsonpath='{.image.dockerImageReference}')" >> $GITHUB_OUTPUT
          echo "server=$(oc get istag fotoalbum-server:latest -n fotoalbum -o jsonpath='{.image.dockerImageReference}')" >> $GITHUB_OUTPUT
          echo "frontend=$(oc get istag fotoalbum-frontend:latest -n fotoalbum -o jsonpath='{.image.dockerImageReference}')" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Generate tfvars
        working-directory: terraform
        run: |
          cat > ci.tfvars <<EOF
          openshift_api_url       = "${{ secrets.OPENSHIFT_SERVER }}"
          openshift_token         = "${{ secrets.OPENSHIFT_TOKEN }}"
          db_password             = "${{ secrets.DB_PASSWORD }}"
          db_username             = "${{ secrets.DB_USERNAME }}"
          db_name                 = "${{ secrets.DB_NAME }}"
          db_type                 = "postgres"
          db_ssl                  = "false"
          jwt_secret              = "${{ secrets.JWT_SECRET }}"
          s3_access_key           = "${{ secrets.MINIO_ACCESS }}"
          s3_secret_key           = "${{ secrets.MINIO_SECRET }}"
          s3_endpoint             = "${{ secrets.S3_ENDPOINT }}"
          s3_image_endpoint       = "${{ secrets.S3_IMAGE_ENDPOINT }}"
          s3_bucket               = "${{ secrets.S3_BUCKET }}"
          cors_origins            = "${{ secrets.CORS_ORIGINS }}"
          next_public_backend_url = "${{ secrets.NEXT_PUBLIC_BACKEND_URL }}"
          auth_endpoint           = "http://fotoalbum-auth:8888"
          auth_image              = "${{ steps.digests.outputs.auth }}"
          backend_image           = "${{ steps.digests.outputs.server }}"
          frontend_image          = "${{ steps.digests.outputs.frontend }}"
          EOF

      - name: Import existing resources
        working-directory: terraform
        run: |
          terraform import -var-file="ci.tfvars" kubernetes_persistent_volume_claim.postgres_pvc fotoalbum/fotoalbum-db || true
          terraform import -var-file="ci.tfvars" kubernetes_deployment.postgres fotoalbum/fotoalbum-db || true
          terraform import -var-file="ci.tfvars" kubernetes_service.postgres fotoalbum/fotoalbum-db || true
          terraform import -var-file="ci.tfvars" kubernetes_secret.fotoalbum_secrets fotoalbum/fotoalbum-secrets || true
          terraform import -var-file="ci.tfvars" kubernetes_config_map.fotoalbum_config fotoalbum/fotoalbum-config || true
          terraform import -var-file="ci.tfvars" kubernetes_deployment.backend fotoalbum/fotoalbum-server || true
          terraform import -var-file="ci.tfvars" kubernetes_service.backend fotoalbum/fotoalbum-server || true
          terraform import -var-file="ci.tfvars" kubernetes_deployment.auth fotoalbum/fotoalbum-auth || true
          terraform import -var-file="ci.tfvars" kubernetes_service.auth fotoalbum/fotoalbum-auth || true
          terraform import -var-file="ci.tfvars" kubernetes_deployment.frontend fotoalbum/fotoalbum-frontend || true
          terraform import -var-file="ci.tfvars" kubernetes_service.frontend fotoalbum/fotoalbum-frontend || true

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -var-file="ci.tfvars"