services:
  # NestJS Service 1
  - type: web
    name: fotoalbum_auth
    runtime: docker
    dockerContext: .
    dockerfilePath: ./fotoalbum_auth/Dockerfile # Removed "services/"
    envVars:
      - key: PORT
        value: 8888

  # NestJS Service 2
  - type: web
    name: fotoalbum_server
    runtime: docker
    dockerContext: .
    dockerfilePath: ./fotoalbum_server/Dockerfile # Removed "services/"
    envVars:
      - key: PORT
        value: 3001

  # Next.js Frontend
  - type: web
    name: fotoalbum_frontend
    runtime: docker
    dockerContext: .
    dockerfilePath: ./fotoalbum_frontend/Dockerfile # Removed "apps/"
    envVars:
      - key: PORT
        value: 3000
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: fotoalbum_server
          type: web
          property: url # Use 'url' for browser-side requests