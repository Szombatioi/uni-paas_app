services:
  - type: web
    name: fotoalbum_auth
    runtime: docker
    dockerContext: .
    dockerfilePath: ./fotoalbum_auth/Dockerfile
    # plan: starter # ONLY ALLOW THESE IF YOU WANT SCALING
    # scaling:
    #   minInstances: 1
    #   maxInstances: 2
    #   targetCPUPercent: 60
    #   targetMemoryPercent: 60
    
  - type: web
    name: fotoalbum_server
    runtime: docker
    dockerContext: .
    dockerfilePath: ./fotoalbum_server/Dockerfile
    # plan: starter # ONLY ALLOW THESE IF YOU WANT SCALING
    # scaling:
    #   minInstances: 1
    #   maxInstances: 3
    #   targetCPUPercent: 60
    #   targetMemoryPercent: 60

  - type: web
    name: fotoalbum_frontend
    runtime: docker
    dockerContext: .
    dockerfilePath: ./fotoalbum_frontend/Dockerfile
    envVars:
      - key: PORT
        value: 3000
      # 👇 Updated to match your Axios code 👇
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          name: fotoalbum_server
          type: web
          property: url